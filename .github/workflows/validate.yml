name: Validate

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  terraform:
    name: Terraform Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.5.0"

      - name: Terraform Format Check
        run: terraform fmt -check -recursive terraform/

      - name: Terraform Init (Module)
        run: |
          cd terraform/modules/service-base
          terraform init -backend=false

      - name: Terraform Validate (Module)
        run: |
          cd terraform/modules/service-base
          terraform validate

  helm:
    name: Helm Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: azure/setup-helm@v4
        with:
          version: "v3.14.0"

      - name: Helm Lint (base)
        run: helm lint charts/document-processor

      - name: Helm Lint (staging)
        run: helm lint charts/document-processor -f charts/document-processor/values-staging.yaml

      - name: Helm Lint (production)
        run: helm lint charts/document-processor -f charts/document-processor/values-production.yaml

      - name: Helm Template (staging)
        run: |
          helm template document-processor charts/document-processor \
            -f charts/document-processor/values.yaml \
            -f charts/document-processor/values-staging.yaml \
            --namespace document-processor > /dev/null

      - name: Helm Template (production)
        run: |
          helm template document-processor charts/document-processor \
            -f charts/document-processor/values.yaml \
            -f charts/document-processor/values-production.yaml \
            --namespace document-processor > /dev/null

  argocd:
    name: ArgoCD Manifest Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate YAML syntax
        run: |
          for f in argocd/*.yaml; do
            echo "Validating $f..."
            python3 -c "import yaml; yaml.safe_load_all(open('$f'))"
          done
