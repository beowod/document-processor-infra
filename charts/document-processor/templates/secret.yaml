{{- if .Values.secrets.create }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "document-processor.fullname" . }}
  labels:
    {{- include "document-processor.labels" . | nindent 4 }}
type: Opaque
data:
  {{- if .Values.secrets.dbConnectionString }}
  DB_CONNECTION_STRING: {{ .Values.secrets.dbConnectionString | b64enc | quote }}
  {{- end }}
  {{- if .Values.secrets.apiKey }}
  API_KEY: {{ .Values.secrets.apiKey | b64enc | quote }}
  {{- end }}
{{- end }}
